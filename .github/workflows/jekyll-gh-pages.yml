#pages

name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      upload_path: ${{ steps.set-path.outputs.upload_path }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies (if package.json exists)
        run: |
          if [ -f package.json ]; then
            npm ci || npm install
          fi

      - name: Build project (if build script exists)
        run: |
          if [ -f package.json ] && grep -q '"build"' package.json; then
            npm run build
          fi

      - name: Determine upload path
        id: set-path
        run: |
          if [ -d "dist" ]; then
            echo "upload_path=dist" >> $GITHUB_OUTPUT
          elif [ -d "build" ]; then
            echo "upload_path=build" >> $GITHUB_OUTPUT
          else
            echo "upload_path=." >> $GITHUB_OUTPUT
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.set-path.outputs.upload_path }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
